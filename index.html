<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AED Graduation Projects 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>

:root{
  --navy:#061123;--navy-2:#0d2546;--navy-3:#14345c;
  --gold:#c9a84c;--gold-2:#e2c97e;--gold-3:#f5e9c4;
  --white:#ffffff;--off-white:#fafaf8;--mist:#64748b;
  --border:rgba(201,168,76,0.22);--border-hover:rgba(201,168,76,0.55);
  --shadow:0 2px 16px rgba(6,17,35,0.06);--shadow-hover:0 8px 32px rgba(201,168,76,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;color:var(--navy);
  font-family:Inter,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.6;
  background:
    repeating-linear-gradient(0deg,rgba(201,168,76,0.04) 0px,rgba(201,168,76,0.04) 1px,transparent 1px,transparent 72px),
    repeating-linear-gradient(90deg,rgba(201,168,76,0.04) 0px,rgba(201,168,76,0.04) 1px,transparent 1px,transparent 72px),
    #ffffff;
}
body.dark-page{
  background:
    repeating-linear-gradient(0deg,rgba(201,168,76,0.06) 0px,rgba(201,168,76,0.06) 1px,transparent 1px,transparent 72px),
    repeating-linear-gradient(90deg,rgba(201,168,76,0.06) 0px,rgba(201,168,76,0.06) 1px,transparent 1px,transparent 72px),
    var(--navy);
}
a{color:inherit;text-decoration:none;cursor:pointer}
.site-shell{width:min(1440px,100%);margin:0 auto;padding:0 28px 48px}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:16px 0 18px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.94);backdrop-filter:blur(20px);
  transition:background 300ms ease,border-color 300ms ease;
}
body.dark-page .topbar{background:rgba(6,17,35,0.94);border-bottom-color:rgba(201,168,76,0.2)}
body.dark-page .topbar .brand-lockup strong{color:#ffffff}
body.dark-page .topbar .brand-mark{color:#ffffff;background:transparent}
body.dark-page .nav-links a{color:rgba(255,255,255,0.8)}
body.dark-page .nav-links a:hover{color:#ffffff;background:rgba(201,168,76,0.12)}
.brand-lockup{display:flex;align-items:center;gap:14px;min-width:260px}
.brand-mark{display:grid;width:52px;height:64px;place-items:center;border:1.5px solid var(--gold);border-radius:26px 26px 8px 8px;color:var(--navy);background:var(--white);font-weight:800;font-size:0.9rem;letter-spacing:0.04em}
.brand-lockup strong{display:block;font-size:0.9rem;font-weight:700;color:var(--navy)}
.brand-lockup small{display:block;margin-top:2px;color:var(--mist);font-size:0.75rem;font-weight:400}
.nav-links{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:6px}
.nav-links a,.back-link{min-height:36px;padding:9px 16px;border:1px solid var(--border);border-radius:999px;color:var(--navy-2);font-size:0.82rem;font-weight:600;transition:all 180ms ease;cursor:pointer;background:transparent;display:inline-flex;align-items:center}
.nav-links a:hover,.back-link:hover{border-color:var(--gold);color:var(--navy);background:rgba(201,168,76,0.07)}
main{outline:none}

/* ANIMATIONS */
.reveal{animation:reveal 520ms cubic-bezier(0.22,1,0.36,1) both;animation-delay:var(--delay,0ms)}
@keyframes reveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.kicker{display:inline-block;margin-bottom:14px;color:var(--gold);font-size:0.72rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase}

/* HERO */
.hero{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,0.9fr);gap:40px;min-height:calc(100vh - 120px);padding:clamp(56px,9vw,120px) clamp(20px,5vw,72px);border:1px solid var(--border);border-radius:12px;background:#ffffff;margin-top:28px}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 85% 30%,rgba(201,168,76,0.06) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 10% 80%,rgba(201,168,76,0.04) 0%,transparent 50%)}
.hero-lines{position:absolute;inset:0;pointer-events:none;opacity:0.08;background:repeating-linear-gradient(90deg,transparent 0 44px,rgba(201,168,76,1) 44px 45px),repeating-linear-gradient(0deg,transparent 0 88px,rgba(201,168,76,1) 88px 89px)}
.hero-copy,.hero-id{position:relative;z-index:1;align-self:center}
.hero h1{font-size:clamp(2.6rem,6.5vw,6.8rem);line-height:0.92;letter-spacing:-0.02em;color:var(--navy);margin-bottom:20px;font-weight:800}
.hero-copy>p{color:var(--mist);max-width:480px;font-size:1.05rem}
.institution-card{border:1px solid var(--border);border-radius:10px;background:#ffffff;padding:28px;display:grid;gap:24px}
.institution-card h2{font-size:clamp(1.4rem,2.5vw,2rem);line-height:1.1;color:var(--navy);font-weight:700}
.institution-card dl{display:grid;gap:12px}
dt{color:var(--gold);font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em}
dd{color:var(--navy);font-size:0.9rem;margin:3px 0 0}

/* NAV GRID */
.navigation-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;padding:24px 0 8px}
.nav-card{position:relative;overflow:hidden;min-height:210px;padding:24px;border:1px solid var(--border);border-radius:10px;background:#ffffff;cursor:pointer;transition:transform 200ms ease,border-color 200ms ease,box-shadow 200ms ease}
.nav-card:hover{transform:translateY(-5px);border-color:var(--gold-2);box-shadow:var(--shadow-hover)}
.nav-card .num{color:var(--gold);font-weight:800;font-size:0.82rem;letter-spacing:0.06em}
.nav-card h2{margin:48px 0 8px;font-size:1.2rem;color:var(--navy);font-weight:700}
.nav-card p{color:var(--mist);font-size:0.85rem;line-height:1.5}
.nav-card-icon{position:absolute;bottom:20px;right:20px;width:68px;height:68px;border:1px solid var(--border);border-radius:50% 50% 8px 8px;opacity:0.35}

/* PAGE INTRO */
.page-intro{padding:clamp(48px,8vw,88px) 0 28px}
.page-intro h1{font-size:clamp(2.2rem,5.5vw,5.2rem);line-height:0.95;letter-spacing:-0.02em;color:var(--navy);font-weight:800;margin-bottom:16px;max-width:900px}
.page-intro>p{color:var(--mist);max-width:720px;font-size:1rem}
body.dark-page .page-intro h1{color:#ffffff}
body.dark-page .page-intro>p{color:rgba(255,255,255,0.55)}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;padding-bottom:16px}
.id-card{position:relative;overflow:hidden;min-height:440px;padding:18px;border:1px solid var(--border);border-radius:10px;background:#ffffff;cursor:pointer;transition:transform 200ms ease,border-color 200ms ease,box-shadow 200ms ease}
.id-card:hover{transform:translateY(-5px);border-color:var(--gold-2);box-shadow:var(--shadow-hover)}
body.dark-page .id-card{background:rgba(13,37,70,0.7);border-color:rgba(201,168,76,0.25)}
body.dark-page .id-card:hover{background:rgba(20,52,92,0.8);border-color:rgba(201,168,76,0.55);box-shadow:0 8px 32px rgba(201,168,76,0.15)}
body.dark-page .id-card .card-code{color:rgba(255,255,255,0.3)}
body.dark-page .id-card .card-content h2{color:#ffffff}
body.dark-page .id-card .card-content .tag-label{color:rgba(255,255,255,0.5)}
body.dark-page .id-card .card-footer{border-top-color:rgba(201,168,76,0.2)}
body.dark-page .id-card .card-footer small{color:rgba(255,255,255,0.35)}
body.dark-page .arch-frame{background:linear-gradient(160deg,rgba(201,168,76,0.12) 0%,rgba(13,37,70,0) 60%),rgba(8,25,50,0.8)}
body.dark-page .qr{background:rgba(6,17,35,0.5);border-color:rgba(201,168,76,0.25)}
body.dark-page .qr span{background:rgba(255,255,255,0.08)}

.card-code{color:rgba(6,17,35,0.35);font-size:0.7rem;font-weight:700;letter-spacing:0.06em}
.portrait{display:grid;place-items:center;margin:24px auto 20px}
.portrait-large{margin:0}
.arch-frame{display:grid;width:160px;height:202px;place-items:center;border:1.5px solid var(--gold);border-radius:80px 80px 10px 10px;background:linear-gradient(160deg,rgba(201,168,76,0.08) 0%,rgba(255,255,255,0) 60%),#fafaf8}
.portrait-large .arch-frame{width:min(260px,100%);height:320px}
.arch-frame span{color:var(--navy-2);font-size:2rem;font-weight:800}
body.dark-page .arch-frame span{color:#ffffff}
.card-content{padding:0 6px}
.card-content .role-label{margin-bottom:6px;color:var(--gold);font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em}
.card-content h2{margin-bottom:8px;font-size:1.25rem;color:var(--navy);font-weight:700}
.card-content .tag-label{color:var(--mist);font-size:0.85rem}
.card-footer{position:absolute;right:18px;bottom:18px;left:18px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-top:1px solid var(--border);padding-top:12px}
.card-footer small{color:rgba(6,17,35,0.45);font-size:0.75rem}
.qr{display:grid;grid-template-columns:repeat(5,6px);gap:3px;width:max-content;padding:7px;border:1px solid var(--border);background:#ffffff;border-radius:4px}
.qr span{width:6px;height:6px;background:rgba(6,17,35,0.08);border-radius:1px}
.qr .filled{background:var(--gold)}

/* IMAGES */
.arch-frame.img-frame{padding:0;overflow:hidden}
.arch-frame.img-frame img{width:100%;height:100%;object-fit:cover;display:block}
.img-frame{overflow:hidden;background:#fafaf8}
.img-frame img{width:100%;height:100%;object-fit:cover;display:block}

/* PROJECTS */
.project-list{display:grid;gap:14px}
.project-card{display:grid;grid-template-columns:160px minmax(0,1fr) auto;align-items:center;gap:22px;padding:20px;border:1px solid var(--border);border-radius:10px;background:#ffffff;cursor:pointer;transition:transform 200ms ease,border-color 200ms ease,box-shadow 200ms ease}
.project-card:hover{transform:translateY(-3px);border-color:var(--gold-2);box-shadow:var(--shadow-hover)}
.project-thumb,.project-seal{display:grid;min-height:120px;place-items:center;border:1px solid var(--border);border-radius:8px;background:repeating-linear-gradient(135deg,rgba(201,168,76,0.1) 0 1px,transparent 1px 16px),#fafaf8;overflow:hidden}
.project-thumb img,.project-seal img{width:100%;height:100%;min-height:120px;object-fit:cover;display:block}
.project-main h2{margin-bottom:6px;font-size:clamp(1.4rem,2.5vw,2.4rem);color:var(--navy);font-weight:700}
.project-main>p{color:var(--mist)}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.meta-row span{padding:6px 12px;border:1px solid var(--border);border-radius:999px;color:var(--navy-2);font-size:0.8rem}

/* DETAIL */
.detail-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;padding-top:44px}
.expanded-id,.backside-panel,.document-panel{border:1px solid var(--border);border-radius:10px;background:#ffffff;padding:clamp(22px,4vw,36px)}
body.dark-page .expanded-id,body.dark-page .backside-panel{background:rgba(13,37,70,0.7);border-color:rgba(201,168,76,0.25)}
body.dark-page .expanded-header h1{color:#ffffff}
body.dark-page .expanded-header>div span{color:rgba(255,255,255,0.5)}
body.dark-page .expanded-header{border-bottom-color:rgba(201,168,76,0.2)}
body.dark-page .expanded-body h2{color:#ffffff}
body.dark-page .expanded-body>div>p{color:rgba(255,255,255,0.55)}
body.dark-page .spec-list dd{color:#ffffff}
body.dark-page .backside-panel h2{color:#ffffff}
body.dark-page .backside-panel>p{color:rgba(255,255,255,0.5)}
body.dark-page .panel-pattern{border-color:rgba(201,168,76,0.2)}
body.dark-page .back-link{color:rgba(255,255,255,0.7);border-color:rgba(201,168,76,0.3)}
body.dark-page .back-link:hover{color:#ffffff;border-color:var(--gold);background:rgba(201,168,76,0.1)}
body.dark-page .meta-row span{color:rgba(255,255,255,0.7);border-color:rgba(201,168,76,0.2)}
.expanded-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:0}
.expanded-header h1,.project-hero h1{margin-bottom:6px;font-size:clamp(2rem,5vw,4.5rem);line-height:0.95;color:var(--navy);font-weight:800}
.expanded-header>div span{color:var(--mist);font-size:0.9rem}
.expanded-body{display:grid;grid-template-columns:280px minmax(0,1fr);gap:32px;padding-top:26px}
.expanded-body h2{font-size:1.3rem;color:var(--navy);font-weight:700;margin-bottom:10px}
.expanded-body>div>p{color:var(--mist)}
.spec-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:24px}
.backside-panel{position:relative;min-height:400px;overflow:hidden}
.backside-panel .qr{margin:22px 0;transform:scale(1.3);transform-origin:left top}
.backside-panel h2{margin-top:66px;color:var(--navy);font-size:1.3rem;font-weight:700}
.backside-panel>p{color:var(--mist);font-size:0.88rem;margin-top:6px}
.panel-pattern{position:absolute;inset:auto 18px 18px auto;width:72px;height:72px;border:1px solid var(--border);border-radius:50% 50% 8px 8px;opacity:0.4}

/* PROJECT DETAIL */
.project-detail{display:grid;gap:16px;padding-top:44px}
.project-hero{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:24px;align-items:stretch;border:1px solid var(--border);border-radius:10px;padding:clamp(22px,5vw,44px);background:#ffffff}
.project-seal{gap:16px}
.project-hero>div>p{color:var(--mist);margin-bottom:0}
.gallery-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.gallery-tile{margin:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#ffffff}
.gallery-tile .img-frame{min-height:200px;background:linear-gradient(140deg,rgba(201,168,76,0.08),transparent),repeating-linear-gradient(90deg,rgba(201,168,76,0.07) 0 1px,transparent 1px 24px)}
.gallery-tile .img-frame img{min-height:200px}
.gallery-tile figcaption{border-top:1px solid var(--border);padding:14px 16px;color:var(--mist);font-size:0.86rem}
.project-backside{min-height:240px}

/* LINKED CARD + ACTION BUTTON */
.linked-project-card{display:flex;align-items:center;gap:16px;margin-top:22px;padding:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color 180ms ease,box-shadow 180ms ease}
.linked-project-card:hover{border-color:var(--gold-2);box-shadow:var(--shadow-hover)}
.linked-project-card .portrait{margin:0;width:64px;flex-shrink:0}
.linked-project-card .portrait .arch-frame{width:64px;height:64px;border-radius:14px}
.linked-project-card .project-thumb{width:64px;height:64px;min-height:64px;border-radius:14px;flex-shrink:0}
.linked-project-card h3{font-size:1.05rem;color:var(--navy);font-weight:700}
.linked-project-card p{color:var(--mist);font-size:0.85rem;margin-top:2px}
body.dark-page .linked-project-card{border-color:rgba(201,168,76,0.25)}
body.dark-page .linked-project-card h3{color:#ffffff}
.action-btn{display:inline-flex;align-items:center;margin-top:14px;padding:11px 22px;border:1px solid var(--gold);border-radius:999px;background:var(--navy);color:#ffffff;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 180ms ease}
.action-btn:hover{background:var(--gold);color:var(--navy);box-shadow:var(--shadow-hover)}
body.dark-page .action-btn{background:var(--gold);color:var(--navy)}
body.dark-page .action-btn:hover{background:var(--gold-2)}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.info-block{border:1px solid var(--border);border-radius:10px;background:#ffffff;padding:24px}
.info-block>p:not(.kicker){color:var(--mist)}
body.dark-page .info-block{background:rgba(13,37,70,0.7);border-color:rgba(201,168,76,0.25)}
body.dark-page .info-block>p:not(.kicker){color:rgba(255,255,255,0.6)}

/* DOCUMENT */
.document-panel{display:grid;gap:22px;max-width:960px}
body.dark-page .document-panel{background:rgba(13,37,70,0.7);border-color:rgba(201,168,76,0.25)}
body.dark-page .document-header h2{color:#ffffff}
body.dark-page .document-header{border-bottom-color:rgba(201,168,76,0.2)}
body.dark-page .document-panel article h3{color:#ffffff}
body.dark-page .document-panel article p{color:rgba(255,255,255,0.55)}
body.dark-page .document-panel article{border-bottom-color:rgba(201,168,76,0.12)}
body.dark-page .document-panel .qr{background:rgba(6,17,35,0.5);border-color:rgba(201,168,76,0.25)}
body.dark-page .document-panel .qr span{background:rgba(255,255,255,0.08)}
body.dark-page dd{color:rgba(255,255,255,0.85)}
.document-header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;border-bottom:1px solid var(--border);padding-bottom:22px}
.document-header h2{font-size:clamp(1.5rem,3vw,2.2rem);color:var(--navy);font-weight:700}
.document-panel article{display:grid;grid-template-columns:260px minmax(0,1fr);gap:24px;border-bottom:1px solid rgba(201,168,76,0.15);padding-bottom:22px}
.document-panel article:last-child{border-bottom:0;padding-bottom:0}
.document-panel article h3{font-size:0.95rem;color:var(--navy);font-weight:700;line-height:1.4}
.document-panel article p{color:var(--mist);font-size:0.9rem;line-height:1.7}

/* UNIVERSITY DETAIL */
.uni-contact-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:8px}
.uni-contact-item{padding:14px 16px;border:1px solid var(--border);border-radius:8px;font-size:0.88rem;color:var(--navy-2)}
.uni-contact-item span{display:block;color:var(--gold);font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.uni-social-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.uni-social-link{padding:8px 14px;border:1px solid var(--border);border-radius:999px;font-size:0.8rem;color:var(--navy-2);transition:all 180ms ease}
.uni-social-link:hover{border-color:var(--gold);background:rgba(201,168,76,0.07)}
body.dark-page .uni-contact-item{color:rgba(255,255,255,0.8);border-color:rgba(201,168,76,0.2)}
body.dark-page .uni-social-link{color:rgba(255,255,255,0.7);border-color:rgba(201,168,76,0.2)}

@media(max-width:1120px){
  .navigation-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .cards-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .hero,.detail-layout,.project-hero{grid-template-columns:1fr}
}
@media(max-width:780px){
  .site-shell{padding:0 16px 40px}
  .topbar{position:relative;align-items:flex-start;flex-direction:column}
  .nav-links{justify-content:flex-start}
  .hero{min-height:auto}
  .navigation-grid,.cards-grid,.gallery-grid{grid-template-columns:1fr}
  .project-card{grid-template-columns:1fr}
  .expanded-body,.spec-list,.document-panel article,.info-grid,.uni-contact-grid{grid-template-columns:1fr}
  .portrait-large .arch-frame{width:200px;height:260px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:1ms!important;transition-duration:1ms!important}}


/* STUDENT CONTACT STRIP */
.contact-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.contact-item{flex:1;min-width:180px;padding:14px 16px;border:1px solid var(--border);border-radius:8px;background:var(--off-white)}
.contact-label{display:block;color:var(--gold);font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.contact-value{color:var(--navy-2);font-size:0.88rem;font-weight:500;text-decoration:none;transition:color 150ms ease}
.contact-value:hover{color:var(--gold)}
body.dark-page .contact-item{background:rgba(8,25,50,0.6);border-color:rgba(201,168,76,0.2)}
body.dark-page .contact-value{color:rgba(255,255,255,0.8)}
body.dark-page .contact-value:hover{color:var(--gold-2)}


/* PROJECT DESCRIPTION BLOCK */
.project-detail-description{color:var(--navy-2);font-size:0.95rem;line-height:1.75}
body.dark-page .project-detail-description{color:rgba(255,255,255,0.75)}


/* PROJECT COVER IMAGE (thumbnail كبيرة في صفحة المشروع) */
.project-cover-wrap{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--off-white);
  aspect-ratio:16/7;
}
.project-cover-img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

    <p class="project-subtitle">A place where architecture becomes a silent therapist, guiding people from emotional burden to inner peace through the healing power of nature.</p>

    <!-- DESCRIPTION -->
    <p class="project-description">AYUR is an emotional healing park located in Siwa Oasis, where architecture becomes a catalyst for restoration rather than merely a physical shelter. Inspired by the timeless relationship between water and sand, the project transforms the landscape into a therapeutic journey that gently guides visitors toward reflection, emotional release, and inner balance. Through immersive sensory experiences, hydrotherapy and sand therapy, meditation and yoga spaces, healing gardens, art therapy workshops, and cultural experiences rooted in Siwan heritage, the park nurtures both mind and body. Every path, material, sound, and natural element is carefully orchestrated to reconnect people with nature, awaken the senses, and foster emotional well-being, allowing healing to unfold gradually through movement, memory, and meaningful experience.</p>

<script>

/* ============================================================
   DATA LOADER
   Reads all content from the <template> blocks in the HTML
   and builds the runtime data objects from them.
   To edit any content: change the HTML <template> blocks above.
   ============================================================ */

function readTemplate(templateId) {
  return document.getElementById(templateId).content;
}

/* ── Site identity ── */
function loadIdentity() {
  const t = readTemplate('site-identity');
  return {
    university : t.getElementById('site-university-name').textContent.trim(),
    faculty    : t.getElementById('site-faculty-name').textContent.trim(),
    program    : t.getElementById('site-program-name').textContent.trim(),
    cohort     : t.getElementById('site-cohort').textContent.trim(),
    code       : t.getElementById('site-code').textContent.trim(),
  };
}

/* ── University info ── */
function loadUniversityInfo() {
  const t = readTemplate('university-info');
  function txt(id) {
    const el = t.getElementById(id);
    return el ? el.querySelector('p,h2') ? el.querySelector('p,h2').textContent.trim() : '' : '';
  }
  function dataVal(id, cls) {
    const el = t.getElementById(id);
    return el ? el.querySelector('.' + cls)?.textContent.trim() || '' : '';
  }
  function allDataVals(id, cls) {
    const el = t.getElementById(id);
    if (!el) return [];
    return [...el.querySelectorAll('.' + cls)].map(d => d.textContent.trim());
  }
  const contactEl = t.getElementById('uni-contact');
  const socialEl  = t.getElementById('uni-social');
  return {
    name        : txt('uni-name'),
    faculty     : txt('uni-faculty'),
    program     : txt('uni-program'),
    programDesc : txt('uni-program-desc'),
    facultyDesc : txt('uni-faculty-desc'),
    about       : txt('uni-about'),
    contact : contactEl ? {
      email   : contactEl.querySelector('.contact-email')?.textContent.trim()   || '',
      phone   : contactEl.querySelector('.contact-phone')?.textContent.trim()   || '',
      address : contactEl.querySelector('.contact-address')?.textContent.trim() || '',
    } : {},
    social : socialEl ? {
      website   : socialEl.querySelector('.social-website')?.textContent.trim()   || '',
      facebook  : socialEl.querySelector('.social-facebook')?.textContent.trim()  || '',
      instagram : socialEl.querySelector('.social-instagram')?.textContent.trim() || '',
      linkedin  : socialEl.querySelector('.social-linkedin')?.textContent.trim()  || '',
    } : {},
  };
}

/* ── Students ── */
function loadStudents() {
  const t = readTemplate('all-students');
  return [...t.querySelectorAll('[id^="student-"]')].map(el => ({
    id          : parseInt(el.dataset.id),
    projectId   : parseInt(el.dataset.projectId),
    photo       : el.querySelector('.student-photo')?.getAttribute('src')      || '',
    name        : el.querySelector('.student-name')?.textContent.trim()        || '',
    code        : el.querySelector('.student-code')?.textContent.trim()        || '',
    email       : el.querySelector('.student-email')?.textContent.trim()       || '',
    phone       : el.querySelector('.student-phone')?.textContent.trim()       || '',
    projectName : el.querySelector('.student-project-name')?.textContent.trim()|| '',
  }));
}

/* ── Projects ── */
function loadProjects() {
  const t = readTemplate('all-projects');
  return [...t.querySelectorAll('[id^="project-"]')].map(el => ({
    id          : parseInt(el.dataset.id),
    studentId   : parseInt(el.dataset.studentId),
    title       : el.querySelector('h3').textContent.trim(),
    thumbnail   : el.querySelector('.project-thumbnail').getAttribute('src'),
    subtitle    : el.querySelector('.project-subtitle')?.textContent.trim()    || '',
    description : el.querySelector('.project-description')?.textContent.trim() || '',
    supervisor  : el.querySelector('.project-supervisor')?.textContent.trim()  || '',
    images      : [...el.querySelectorAll('.project-gallery img')].map(i => i.getAttribute('src')),
  }));
}

/* ── Professors ── */
function loadProfessors() {

    id      : el.dataset.id,
    name    : el.querySelector('h3').textContent.trim(),
    photo   : el.querySelector('img').getAttribute('src'),
    title   : el.querySelector('.professor-title')?.textContent.trim()  || '',
    tag     : el.querySelector('.professor-tag')?.textContent.trim()    || '',
    email   : el.querySelector('.professor-email')?.textContent.trim()  || '',
    bio     : el.querySelector('.professor-bio')?.textContent.trim()    || '',
    role    : 'Professor',
    portrait: el.querySelector('h3').textContent.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
  }));
}

/* ── Teaching Assistants ── */
function loadAssistants() {
  const t = readTemplate('all-assistants');

    id      : el.dataset.id,
    name    : el.querySelector('h3').textContent.trim(),

  }));
}

/* ============================================================
   ROUTER & THEME
   ============================================================ */
const DARK_PAGES = ['students', 'university'];
let currentRoute = '/';

function setTheme(section) {
  document.body.classList.toggle('dark-page', DARK_PAGES.includes(section));
}
function navigate(path) { currentRoute = path; render(); window.scrollTo(0, 0); }

/* ============================================================
   UI HELPERS
   ============================================================ */
function qr(label = 'AED') {
  const cells = Array.from({ length: 25 }, (_, i) => {
    const f = [0,1,2,5,7,10,11,14,17,19,20,22,24].includes((i + label.length) % 25);
    return `<span class="${f ? 'filled' : ''}"></span>`;
  }).join('');
  return `<div class="qr" aria-hidden="true">${cells}</div>`;
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function archPhoto(src, alt, scale = 'normal') {
  return `<div class="portrait portrait-${scale}">
    <div class="arch-frame img-frame">
      <img src="${src}" alt="${alt}" loading="lazy"
           onerror="this.style.display='none';this.parentElement.innerHTML+='<span>${initials(alt)}</span>'"/>
    </div>
  </div>`;
}

function archInitials(inits, scale = 'normal') {
  return `<div class="portrait portrait-${scale}"><div class="arch-frame"><span>${inits}</span></div></div>`;
}

function thumbImg(src, alt) {
  return `<div class="project-thumb img-frame">
    <img src="${src}" alt="${alt}" loading="lazy"
         onerror="this.style.display='none';this.parentElement.innerHTML+='<span>${initials(alt)}</span>'"/>
  </div>`;
}

function pageIntro(kicker, title, body) {
  return `<section class="page-intro reveal">
    <p class="kicker">${kicker}</p>
    <h1>${title}</h1>
    <p>${body}</p>
  </section>`;
}

/* ============================================================
   CARD BUILDERS
   ============================================================ */
function studentCard(s) {
  const proj = projects.find(p => p.studentId === s.id);
  return `<div class="id-card reveal" onclick="navigate('/students/${s.id}')">

    <div class="card-content">
      <p class="role-label">Student</p>
      <h2>${s.name}</h2>
      <span class="tag-label">${s.code}</span>
    </div>
    <div class="card-footer">
      <small>${s.projectName || (proj ? proj.title : 'Unassigned')}</small>
      ${qr(s.name)}
    </div>
  </div>`;
}

function staffCard(person, type) {
  return `<div class="id-card reveal" onclick="navigate('/${type}/${person.id}')">
    <div class="card-code">${identity.code}</div>
    ${archPhoto(person.photo, person.name)}
    <div class="card-content">
      <p class="role-label">${person.role}</p>
      <h2>${person.name}</h2>
      <span class="tag-label">${person.tag}</span>
    </div>
    <div class="card-footer"><small>${person.title}</small>${qr(person.name)}</div>
  </div>`;
}

function projectCard(p) {
  const stu = students.find(s => s.id === p.studentId);
  return `<div class="project-card reveal" onclick="navigate('/projects/${p.id}')">
    ${thumbImg(p.thumbnail, p.title)}
    <div class="project-main">
      <p class="kicker">AED-P-${String(p.id).padStart(3,'0')}</p>
      <h2>${p.title}</h2>
      ${p.subtitle ? `<p class="project-card-subtitle">${p.subtitle}</p>` : ''}
      <div class="meta-row">
        <span>${stu ? stu.name : 'Unassigned'}</span>
      </div>
    </div>
    ${qr(p.title)}
  </div>`;
}

/* ============================================================
   LISTING PAGES
   ============================================================ */
function listing(type) {
  const labels = {
    students  : ['Student Registry','Graduating Candidates','31 graduating students across Architecture and Environmental Design — each card opens a full profile with linked project.'],
    professors: ['Academic Registry','Professors','Formal academic profiles for program leadership, studio supervisors, and environmental design advisors.'],
    assistants: ['Studio Registry','Teaching Assistants','A lighter identity hierarchy for the team supporting representation, fabrication, and research methods.'],
    projects  : ['Portfolio Registry','Graduation Projects','31 graduation projects — each card opens a full project page with gallery, description, and linked student.'],
  };
  if (type === 'projects')
    return `${pageIntro(...labels[type])}<section class="project-list">${projects.map(projectCard).join('')}</section>`;
  if (type === 'students')
    return `${pageIntro(...labels[type])}<section class="cards-grid">${students.map(s => studentCard(s)).join('')}</section>`;
  return `${pageIntro(...labels[type])}<section class="cards-grid">${collections[type].map(p => staffCard(p, type)).join('')}</section>`;
}

  ];
  return `<section class="hero reveal">
    <div class="hero-bg"></div><div class="hero-lines"></div>
    <div class="hero-copy">
      <p class="kicker">${identity.faculty}</p>
      <h1>${identity.program}</h1>
      <p>${identity.cohort}</p>
    </div>
    <div class="hero-id">
      <div class="institution-card">
        <div><p class="kicker">Digital Identity System</p><h2>${identity.university}</h2></div>
        ${qr(identity.code)}
        <dl>
          <div><dt>Program</dt><dd>AED</dd></div>
          <div><dt>Cohort</dt><dd>2026</dd></div>
          <div><dt>Archive</dt><dd>Graduation Projects</dd></div>
        </dl>
      </div>
    </div>
  </section>
  <section class="navigation-grid">
    ${cards.map(([t,txt,route],i) => `
    <div class="nav-card reveal" style="--delay:${i*70}ms" onclick="navigate('/${route}')">
      <span class="num">0${i+1}</span>
      <h2>${t}</h2>
      <p>${txt}</p>
      <div class="nav-card-icon"></div>
    </div>`).join('')}
  </section>`;
}

function notFound() {
  return `<section class="page-intro reveal">
    <p class="kicker">Archive Notice</p>
    <h1>Identity record not found</h1>
    <p>The requested registry entry is not available in this showcase.</p>
    <span class="back-link" onclick="navigate('/')">Return home</span>
  </section>`;
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const app   = document.getElementById('app');
  const parts = currentRoute.replace(/^\//, '').split('/').filter(Boolean);
  const [section, id] = parts;
  setTheme(section);
  let html = '';
  if (!section) {
    html = homePage();
  } else if (['students','professors','assistants','projects'].includes(section) && !id) {
    html = listing(section);
  } else if (section === 'students' && id) {
    const s = students.find(i => String(i.id) === String(id));
    html = s ? studentDetail(s) : notFound();
  } else if (['professors','assistants'].includes(section) && id) {
    const p = entityRoutes.find(i => i.type === section && i.id === id);
    html = p ? staffDetail(p) : notFound();
  } else if (section === 'projects' && id) {
    const p = projects.find(i => String(i.id) === String(id));
    html = p ? projectDetail(p) : notFound();
  } else if (section === 'university') {
    html = universityPage();
  } else {
    html = notFound();
  }
  app.innerHTML = html;
  app.focus({ preventScroll: true });
}

render();

</script>
</body>
</html>
